<svg xmlns="http://www.w3.org/2000/svg" width="280" height="160" viewBox="0 0 280 160">
  <rect width="280" height="160" fill="#374151"/>
  <!-- Road surface -->
  <rect x="0" y="20" width="280" height="120" fill="#4b5563"/>
  <!-- Solid yellow center line -->
  <line x1="140" y1="20" x2="140" y2="140" stroke="#fbbf24" stroke-width="5"/>
  <!-- White edge lines -->
  <line x1="20" y1="20" x2="20" y2="140" stroke="white" stroke-width="3"/>
  <line x1="260" y1="20" x2="260" y2="140" stroke="white" stroke-width="3"/>
</svg>
